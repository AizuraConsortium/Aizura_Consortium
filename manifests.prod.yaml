# Kubernetes Production Manifests for Aizura Consortium
# NOTE: Update image registry paths and domain names before deploying

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: aizura-consortium

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aizura-backend
  namespace: aizura-consortium
  labels:
    app: aizura-backend
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aizura-backend
  template:
    metadata:
      labels:
        app: aizura-backend
        component: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/your-org/aizura-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: supabase-url
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: supabase-service-role-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: openai-api-key
        - name: GROK_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: grok-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: gemini-api-key
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: deepseek-api-key
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: aizura-secrets
              key: qwen-api-key
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: aizura-config
              key: allowed-origins
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: aizura-backend
  namespace: aizura-consortium
  labels:
    app: aizura-backend
spec:
  selector:
    app: aizura-backend
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aizura-frontend
  namespace: aizura-consortium
  labels:
    app: aizura-frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aizura-frontend
  template:
    metadata:
      labels:
        app: aizura-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/your-org/aizura-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: aizura-frontend
  namespace: aizura-consortium
  labels:
    app: aizura-frontend
spec:
  selector:
    app: aizura-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http
  type: ClusterIP

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: aizura-config
  namespace: aizura-consortium
data:
  allowed-origins: "https://aizura.yourdomain.com,https://app.aizura.com"

---
# Ingress (requires nginx-ingress or similar controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aizura-ingress
  namespace: aizura-consortium
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - aizura.yourdomain.com
    secretName: aizura-tls
  rules:
  - host: aizura.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: aizura-backend
            port:
              number: 3001
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: aizura-backend
            port:
              number: 3001
      - path: /health
        pathType: Exact
        backend:
          service:
            name: aizura-backend
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aizura-frontend
            port:
              number: 80

---
# HorizontalPodAutoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aizura-backend-hpa
  namespace: aizura-consortium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aizura-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# HorizontalPodAutoscaler for Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aizura-frontend-hpa
  namespace: aizura-consortium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aizura-frontend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# PodDisruptionBudget for Backend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aizura-backend-pdb
  namespace: aizura-consortium
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aizura-backend

---
# PodDisruptionBudget for Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aizura-frontend-pdb
  namespace: aizura-consortium
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: aizura-frontend
