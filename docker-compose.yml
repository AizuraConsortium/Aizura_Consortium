services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aizura-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BASE_URL: ${API_BASE_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROK_API_KEY: ${GROK_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
      ADMIN_WHITELISTED_IPS: ${ADMIN_WHITELISTED_IPS:-127.0.0.1,::1}
      WEBHOOK_PROPOSAL_SECRET: ${WEBHOOK_PROPOSAL_SECRET:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      OFFICIAL_TWITTER_USERNAME: ${OFFICIAL_TWITTER_USERNAME:-AizuraAI}
      OFFICIAL_TWITTER_ID: ${OFFICIAL_TWITTER_ID:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      OFFICIAL_DISCORD_SERVER_ID: ${OFFICIAL_DISCORD_SERVER_ID:-}
      OFFICIAL_DISCORD_SERVER_NAME: ${OFFICIAL_DISCORD_SERVER_NAME:-Aizura}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OFFICIAL_GITHUB_ORG: ${OFFICIAL_GITHUB_ORG:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      OFFICIAL_TELEGRAM_CHANNEL: ${OFFICIAL_TELEGRAM_CHANNEL:-}
      OFFICIAL_TELEGRAM_CHANNEL_USERNAME: ${OFFICIAL_TELEGRAM_CHANNEL_USERNAME:-}
    expose:
      - "3001"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - aizura

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: aizura-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - aizura

networks:
  aizura:
    driver: bridge
